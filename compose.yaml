services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: devmind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: devmind-redis
    restart: unless-stopped
    command: redis-server --requirepass devmind_redis_pass
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "devmind_redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
